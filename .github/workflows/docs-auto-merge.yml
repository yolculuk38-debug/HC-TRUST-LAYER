name: Docs Review Policy
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.
# Boundary: advisory_only=true; public_safe=true; truth_guarantee=false.
# CI/checks are evidence, not trust authority; human final authority remains required.
# Report-only/advisory-only: must not approve, merge, close, bypass human review, or create autonomous authority.
# Governance boundary: this workflow is read-only and report-only. It must never label, comment, approve, close, enable auto-merge, or perform merge actions.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-and-report:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-22.04
    steps:
      - name: Classify PR and report review requirements
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const docsOnlyPatterns = [
              /^docs\//,
              /^README\.md$/,
              /^CONTRIBUTING\.md$/,
              /^CHANGELOG\.md$/,
              /^LICENSE$/,
              /^records\/.*\.md$/,
              /^examples\/.*\.md$/,
              /^timeline\/.*\.md$/,
              /^halkalar\/.*\.md$/,
              /^ROADMAP\.md$/,
              /^GENESIS_BLOCK\.md$/
            ];

            const alwaysManualPatterns = [
              /^src\//,
              /^schema\//,
              /^\.github\/workflows\//,
              /^SECURITY\.md$/,
              /^CODEOWNERS$/,
              /^requirements\.txt$/,
              /^package\.json$/,
              /^pnpm-lock\.yaml$/
            ];

            const changedFiles = files.map(file => file.filename);
            const touchesManualArea = changedFiles.some(path => alwaysManualPatterns.some(pattern => pattern.test(path)));
            const allInDocsScope = changedFiles.length > 0 && changedFiles.every(path => docsOnlyPatterns.some(pattern => pattern.test(path)));
            const docsOnly = allInDocsScope && !touchesManualArea;
            const hasDocsChanges = changedFiles.some(path => docsOnlyPatterns.some(pattern => pattern.test(path)));
            const mixedDocsAndManual = touchesManualArea && hasDocsChanges;
            const classification = docsOnly
              ? 'docs-only advisory scope'
              : mixedDocsAndManual
                ? 'mixed documentation and manual-review scope'
                : 'manual-review scope';

            core.info(`Changed files: ${changedFiles.length ? changedFiles.join(', ') : '(none reported)'}`);
            core.info(`Changed scope / review classification: ${classification}`);
            core.info('Human review required.');
            core.info('Human merge required.');
