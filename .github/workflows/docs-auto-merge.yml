name: Docs Review Policy
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.
# Governance boundary: this workflow must never enable or perform auto-merge.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-and-label:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-22.04
    steps:
      - name: Ensure required labels exist
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = [
              {
                name: 'docs-auto',
                color: '0E8A16',
                description: 'Documentation-only changes; advisory classification for human review.'
              },
              {
                name: 'manual-review',
                color: 'B60205',
                description: 'Touches code/schema/workflows/src or other sensitive areas; manual review required.'
              }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                } else {
                  throw error;
                }
              }
            }

      - name: Classify PR and apply review labels without auto-merge
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const docsOnlyPatterns = [
              /^docs\//,
              /^README\.md$/,
              /^CONTRIBUTING\.md$/,
              /^CHANGELOG\.md$/,
              /^LICENSE$/,
              /^records\/.*\.md$/,
              /^examples\/.*\.md$/,
              /^timeline\/.*\.md$/,
              /^halkalar\/.*\.md$/,
              /^ROADMAP\.md$/,
              /^GENESIS_BLOCK\.md$/
            ];

            const alwaysManualPatterns = [
              /^src\//,
              /^schema\//,
              /^\.github\/workflows\//,
              /^SECURITY\.md$/,
              /^CODEOWNERS$/,
              /^requirements\.txt$/,
              /^package\.json$/,
              /^pnpm-lock\.yaml$/
            ];

            const changedFiles = files.map(file => file.filename);
            const touchesManualArea = changedFiles.some(path => alwaysManualPatterns.some(pattern => pattern.test(path)));
            const allInDocsScope = changedFiles.length > 0 && changedFiles.every(path => docsOnlyPatterns.some(pattern => pattern.test(path)));
            const docsOnly = allInDocsScope && !touchesManualArea;
            const hasDocsChanges = changedFiles.some(path => docsOnlyPatterns.some(pattern => pattern.test(path)));
            const mixedDocsAndManual = touchesManualArea && hasDocsChanges;

            const toAdd = docsOnly
              ? ['docs-auto']
              : mixedDocsAndManual
                ? ['manual-review', 'docs-auto']
                : ['manual-review'];

            const toRemove = docsOnly
              ? ['manual-review', 'auto-merge']
              : mixedDocsAndManual
                ? ['auto-merge']
                : ['docs-auto', 'auto-merge'];

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: toAdd
            });

            for (const label of toRemove) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: label });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (docsOnly) {
              core.info('Docs-only PR detected: docs-auto label applied for advisory classification only. Human merge is required.');
            } else {
              core.info('Manual review required: auto-merge is not enabled by this workflow.');
            }
