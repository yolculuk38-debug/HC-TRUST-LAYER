name: Canonical Artifact Boundary Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  canonical-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Canonical artifact guard
        run: python scripts/check_canonical_artifacts.py
