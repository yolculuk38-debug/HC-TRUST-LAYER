name: Canonical Artifact Boundary Guard
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      # Keep pull_request coverage broad; limit trusted main-push runs to files inspected by the canonical boundary guard.
      - records/**
      - generated/**
      - docs/generated/**
      - docs/canonical-record-boundary.md
      - docs/ai-collaboration-workflow.md
      - docs/capability-status.md
      - scripts/check_canonical_artifacts.py
      - .github/workflows/canonical-artifacts.yml

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  canonical-artifacts:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Canonical artifact guard
        run: python scripts/check_canonical_artifacts.py
