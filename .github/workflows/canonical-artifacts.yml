name: Canonical Artifact Boundary Guard

on:
  pull_request:
    paths:
      - 'records/**'
      - 'schema/**'
      - 'src/**'
      - 'scripts/check_canonical_artifacts.py'
      - 'policy/**'
      - '.github/workflows/**'
      - '.github/workflows/canonical-artifacts.yml'
  push:
    branches:
      - main
    paths:
      - 'records/**'
      - 'schema/**'
      - 'src/**'
      - 'scripts/check_canonical_artifacts.py'
      - 'policy/**'
      - '.github/workflows/**'
      - '.github/workflows/canonical-artifacts.yml'

permissions:
  contents: read

jobs:
  canonical-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Canonical artifact guard
        run: python scripts/check_canonical_artifacts.py
