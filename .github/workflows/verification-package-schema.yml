name: verification-package-schema
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      # Keep pull_request coverage broad, but limit post-merge main-push runs to files inspected by this schema/example check.
      - schema/verification-package-v1.schema.json
      - examples/verification-package-example.json
      - scripts/check_verification_package_schema.py
      - .github/workflows/verification-package-schema.yml

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-verification-package-example:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install validation dependency
        run: python -m pip install jsonschema

      - name: Validate verification package example
        run: python scripts/check_verification_package_schema.py
