name: HC Review Window Marker
# Advisory/non-blocking manual marker only. Does not delay checks, approve, merge, label, assign, close, or request reviewers.
# PR review-window reporting now lives inside HC Control Bot Report; automatic PR triggers are disabled.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number for manual marker debugging
        required: true
      head_sha:
        description: Optional head SHA to show in the advisory marker
        required: false

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  marker:
    name: Update advisory PR marker
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - name: Create or update HC Review Window marker
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- hc-review-window -->';
            const autoMarker = '<!-- hc-review-window:auto-marker -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const workflowInputs = context.payload.inputs || {};
            const inputPrNumber = workflowInputs.pr_number || '';
            const inputHeadSha = workflowInputs.head_sha || '';

            if (!pr && !inputPrNumber) {
              core.setFailed('Missing pull request metadata or manual pr_number input.');
              return;
            }

            const prNumber = pr ? pr.number : Number(inputPrNumber);
            const headSha = pr ? pr.head.sha : (inputHeadSha || context.sha);
            const observedAt = new Date();
            const eligibleAfter = new Date(observedAt.getTime() + 90 * 1000);
            const timestamp = (date) => date.toISOString().replace(/\.\d{3}Z$/, 'Z');

            const body = [
              marker,
              autoMarker,
              '👀 ⏳ HC Review Window',
              `- Head SHA: ${headSha}`,
              `- Observed at: ${timestamp(observedAt)}`,
              `- Eligible after: ${timestamp(eligibleAfter)}`,
              '- Status: waiting for late Codex review/comments before HC Trust Engineer may report merge-readiness',
              '- Checks are not delayed by this timer',
              '- Merge still requires final HC Trust Engineer review and explicit maintainer command'
            ].join('\n');

            const isCommentPermissionFallback = (error) => (
              error.status === 403
              && typeof error.message === 'string'
              && error.message.includes('Resource not accessible by integration')
            );

            const writeMarkerSummary = async () => {
              const summaryPath = process.env.GITHUB_STEP_SUMMARY;
              if (!summaryPath) {
                throw new Error('Missing GITHUB_STEP_SUMMARY path.');
              }
              await fs.promises.appendFile(summaryPath, `${body}\n`, 'utf8');
            };

            const warnAndSummarize = async (action, error) => {
              core.warning(`Could not ${action} HC Review Window marker comment because GitHub denied issue comment access: ${error.message}`);
              await writeMarkerSummary();
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.filter((comment) => comment.body && comment.body.includes(autoMarker));

            if (existing.length > 0) {
              try {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing[0].id,
                  body
                });
              } catch (error) {
                if (isCommentPermissionFallback(error)) {
                  await warnAndSummarize('update the', error);
                  return;
                }
                throw error;
              }
              if (existing.length > 1) {
                core.warning(`Found ${existing.length} workflow-owned HC Review Window marker comments; updated the oldest marker without creating another.`);
              } else {
                core.info('Updated existing workflow-owned HC Review Window marker comment.');
              }
              return;
            }

            try {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            } catch (error) {
              if (isCommentPermissionFallback(error)) {
                await warnAndSummarize('create the', error);
                return;
              }
              throw error;
            }
            core.info('Created workflow-owned HC Review Window marker comment.');
