name: HC-TRUST-LAYER Validation
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  push:
    paths:
      - 'records/**'
      - 'schema/**'
      - 'src/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'records/**'
      - 'schema/**'
      - 'src/**'
      - '.github/workflows/validate.yml'

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate records against schema
        run: |
          python - <<'PY'
          import json
          import os
          from jsonschema import validate

          schema_path = "schema/record-v1.schema.json"
          records_dir = "records"
          skip_files = {
              os.path.normpath("records/explorer_index.json"),
              os.path.normpath("generated/explorer_index.json"),
          }

          with open(schema_path, "r", encoding="utf-8") as f:
              schema = json.load(f)

          for root, _, files in os.walk(records_dir):
              for file in files:
                  if file.endswith(".json"):
                      path = os.path.normpath(os.path.join(root, file))
                      if path in skip_files:
                          print(f"SKIP generated index: {path}")
                          continue
                      with open(path, "r", encoding="utf-8") as f:
                          record = json.load(f)
                      validate(instance=record, schema=schema)
                      print(f"PASS: {path}")

          print("Generated audit snapshots are excluded from canonical record validation.")
          print("All records validated successfully.")
          PY

      - name: Verify content hashes
        run: python src/verify_hashes.py records

      - name: Generate audit snapshot
        run: python src/generate_audit_snapshot.py


      - name: Generate explorer index
        run: python src/generate_explorer_index.py

      - name: Upload explorer index artifact
        uses: actions/upload-artifact@v4
        with:
          name: explorer-index
          path: generated/explorer_index.json

      - name: Upload audit snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit-snapshot
          path: generated/audit_snapshot.json
