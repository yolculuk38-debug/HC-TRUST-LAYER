name: HC-TRUST-LAYER Archive Automation
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  push:
    paths:
      - 'records/**'
      - 'src/**'
      - 'docs/**'
      - 'qr/**'

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  archive-system:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Normalize Records
        run: python src/normalize_records.py

      - name: Verify Hashes
        run: python src/verify_hashes.py

      - name: Generate Archive Index
        run: python src/generate_index.py

      - name: Generate QR Codes
        run: python src/qr.py --batch
