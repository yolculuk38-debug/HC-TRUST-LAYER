name: HC Control Bot Advisory Comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: hc-control-bot-advisory-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  advisory-comment:
    name: HC Control Bot single advisory comment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Collect changed file paths from GitHub API
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          page = 1
          filenames = []

          while True:
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  items = json.loads(response.read().decode("utf-8"))

              if not items:
                  break

              filenames.extend(item["filename"] for item in items)
              page += 1

          with open("hc-control-bot-changed-paths.txt", "w", encoding="utf-8") as handle:
              for filename in filenames:
                  handle.write(filename + "\n")

          print(f"Collected {len(filenames)} changed path(s).")
          PY

      - name: Run deterministic scanner
        run: |
          python scripts/hc_control_bot.py --pretty --paths-file hc-control-bot-changed-paths.txt | tee hc-control-bot-report.json

      - name: Upload advisory report artifact
        uses: actions/upload-artifact@v7
        with:
          name: hc-control-bot-advisory-report-${{ github.event.pull_request.number }}
          path: hc-control-bot-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Post or update single advisory comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          marker = "<!-- hc-control-bot-advisory-comment -->"
          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]

          with open("hc-control-bot-report.json", "r", encoding="utf-8") as handle:
              report = json.load(handle)

          def section(title, values):
              if not values:
                  return f"- {title}: none"
              rendered = ", ".join(f"`{value}`" for value in values[:10])
              extra = "" if len(values) <= 10 else f" and {len(values) - 10} more"
              return f"- {title}: {rendered}{extra}"

          body = "\n".join([
              marker,
              "## HC Control Bot advisory observation",
              "",
              "This is advisory and uses changed file path metadata only.",
              "It is not approval, rejection, merge authority, assignment authority, or a final validation result.",
              "Human maintainers retain final authority.",
              "",
              f"- review priority: `{report.get('review_priority', 'unknown')}`",
              section("suggested labels", report.get("suggested_labels", [])),
              section("suggested human reviewer roles", report.get("suggested_reviewers", [])),
              section("protected paths", report.get("protected_paths_touched", [])),
              section("governance-adjacent paths", report.get("governance_adjacent_paths_touched", [])),
              section("generated artifact paths", report.get("generated_artifacts_observed", [])),
              section("warnings", report.get("warnings", [])),
              section("evidence prompts", report.get("evidence_prompts", [])),
              section("review routes", report.get("review_routes", [])),
              "",
              "Boundary: advisory-only; no labels, assignments, approvals, review decisions, or merge actions.",
          ])

          list_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def error_details(exc):
              try:
                  raw_body = exc.read().decode("utf-8", errors="replace")
              except Exception:
                  raw_body = ""

              message = ""
              if raw_body:
                  try:
                      message = json.loads(raw_body).get("message", "")
                  except json.JSONDecodeError:
                      message = raw_body

              return message.strip(), raw_body

          def is_permission_denied_403(exc, message, raw_body):
              if exc.code != 403:
                  return False

              remaining = exc.headers.get("x-ratelimit-remaining", "")
              retry_after = exc.headers.get("retry-after", "")
              lower_details = f"{message}\n{raw_body}".lower()
              rate_limit_terms = (
                  "rate limit",
                  "secondary rate",
                  "abuse detection",
                  "too many requests",
              )
              if remaining == "0" or retry_after or any(term in lower_details for term in rate_limit_terms):
                  return False

              permission_terms = (
                  "resource not accessible by integration",
                  "must have",
                  "permission",
                  "not authorized",
                  "requires authentication",
              )
              return any(term in lower_details for term in permission_terms)

          try:
              request = urllib.request.Request(list_url, headers=headers)
              with urllib.request.urlopen(request, timeout=20) as response:
                  comments = json.loads(response.read().decode("utf-8"))

              existing = next((item for item in comments if marker in item.get("body", "")), None)
              payload = json.dumps({"body": body}).encode("utf-8")

              if existing:
                  url = existing["url"]
                  method = "PATCH"
              else:
                  url = list_url
                  method = "POST"

              request = urllib.request.Request(url, data=payload, headers=headers, method=method)
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(f"Advisory comment {method} completed with status {response.status}.")
          except urllib.error.HTTPError as exc:
              message, raw_body = error_details(exc)
              if is_permission_denied_403(exc, message, raw_body):
                  print(
                      "::notice::Advisory comment skipped: "
                      "GitHub API returned HTTP 403 consistent with missing token permissions. "
                      "The uploaded artifact remains the source of truth."
                  )
              else:
                  detail = f": {message}" if message else ""
                  print(f"::warning::Advisory comment skipped: GitHub API returned HTTP {exc.code}{detail}.")
              sys.exit(0)
          except Exception as exc:
              print(f"::warning::Advisory comment skipped: {exc}")
              sys.exit(0)
          PY
