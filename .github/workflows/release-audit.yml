name: HC Release Audit

# Governance boundary: local report-only release evidence. This workflow does not
# publish releases, create tags, mutate changelogs, or grant merge authority.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-audit:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build release audit JSON for pull request
        if: github.event_name == 'pull_request'
        run: python scripts/hc_release_audit.py . --format json --base-ref "origin/${{ github.base_ref }}" --head-ref HEAD --pr-number "${{ github.event.pull_request.number }}" > hc-release-audit.json

      - name: Build release audit Markdown for pull request
        if: github.event_name == 'pull_request'
        run: python scripts/hc_release_audit.py . --format md --base-ref "origin/${{ github.base_ref }}" --head-ref HEAD --pr-number "${{ github.event.pull_request.number }}" > hc-release-audit.md

      - name: Build release audit JSON for manual context
        if: github.event_name != 'pull_request'
        run: python scripts/hc_release_audit.py . --format json > hc-release-audit.json

      - name: Build release audit Markdown for manual context
        if: github.event_name != 'pull_request'
        run: python scripts/hc_release_audit.py . --format md > hc-release-audit.md

      - name: Print release audit summary
        run: sed -n '1,120p' hc-release-audit.md

      - name: Append release audit summary
        run: cat hc-release-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release audit artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hc-release-audit
          path: |
            hc-release-audit.json
            hc-release-audit.md
          retention-days: 14
