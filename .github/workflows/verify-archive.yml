name: Verify HC-TRUST-LAYER Archive
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - LICENSE
      - GENESIS_BLOCK.md
      - docs/**
      - witness-archive/**
      - hash/**
      - records/**
      - schema/**
      - src/**
      - .github/workflows/verify-archive.yml

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-archive:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify required files
        run: |
          echo "Checking repository structure..."

          required_paths=(
            "README.md"
            "LICENSE"
            "GENESIS_BLOCK.md"
            "docs"
            "witness-archive"
            "hash"
            "records"
            "schema"
            "src"
          )

          for path in "${required_paths[@]}"
          do
            if [ ! -e "$path" ]; then
              echo "Missing required path: $path"
              exit 1
            fi
          done

          echo "Repository structure verified."

      - name: Verify JSON schema exists
        run: |
          if [ ! -f "schema/record-v1.schema.json" ]; then
            echo "Schema file missing."
            exit 1
          fi

          echo "Schema file exists."

      - name: Verify Python source files
        run: |
          required_scripts=(
            "src/verify_hashes.py"
            "src/normalize_records.py"
            "src/generate_index.py"
          )

          for script in "${required_scripts[@]}"
          do
            if [ ! -f "$script" ]; then
              echo "Missing script: $script"
              exit 1
            fi
          done

          echo "Python source files verified."

      - name: Verify records directory
        run: |
          if [ ! -d "records" ]; then
            echo "Records directory missing."
            exit 1
          fi

          echo "Records directory verified."

      - name: Archive verification complete
        run: |
          echo "HC-TRUST-LAYER archive verification completed successfully."
