name: Terminology Guard
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      # Keep pull_request coverage broad, but limit post-merge main-push runs to files inspected by the terminology guard.
      - README.md
      - docs/**/*.md
      - .github/**/*.md
      - .terminology_allowlist
      - scripts/check_terminology.py
      - .github/workflows/terminology.yml

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terminology:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run terminology guard
        run: python3 scripts/check_terminology.py
