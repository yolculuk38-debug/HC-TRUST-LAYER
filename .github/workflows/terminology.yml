name: Terminology Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  terminology:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run terminology guard
        run: python scripts/check_terminology.py
