name: HC Control Bot Report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: hc-control-bot-report-${{ github.event.pull_request.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  report:
    name: HC Control Bot report-only scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-base
          persist-credentials: false

      - name: Check out PR head documentation as data
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-docs-data
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Collect changed file paths from GitHub API
        working-directory: trusted-base
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          page = 1
          filenames = []

          while True:
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  items = json.loads(response.read().decode("utf-8"))

              if not items:
                  break

              filenames.extend(item["filename"] for item in items)
              page += 1

          with open("hc-control-bot-changed-paths.txt", "w", encoding="utf-8") as handle:
              for filename in filenames:
                  handle.write(filename + "\n")

          print(f"Collected {len(filenames)} changed path(s).")
          PY

      - name: Run workflow taxonomy drift report
        run: |
          if [ -f trusted-base/scripts/hc_workflow_taxonomy_drift_report.py ]; then
            python trusted-base/scripts/hc_workflow_taxonomy_drift_report.py \
              --paths-file trusted-base/hc-control-bot-changed-paths.txt \
              | tee trusted-base/hc-workflow-taxonomy-drift.md
          else
            cat > trusted-base/hc-workflow-taxonomy-drift.md <<'EOF'
          ## HC Workflow Taxonomy Drift

          - status: skipped
          - message: Trusted-base workflow taxonomy drift checker is unavailable on this base revision. Future PRs run this report after the checker lands.
          - advisory_only=true
          - public_safe=true
          - truth_guarantee=false
          - human_review_required=true
          - expected_taxonomy_path: `docs/project-control/workflow-taxonomy.md`
          - merge_blocking: false
          - note: This report is advisory only and does not block merge.
          EOF
          fi
          cat trusted-base/hc-workflow-taxonomy-drift.md >> "${GITHUB_STEP_SUMMARY}"
          exit 0

      - name: Run deterministic scanner
        working-directory: trusted-base
        run: |
          python scripts/hc_control_bot.py --pretty --paths-file hc-control-bot-changed-paths.txt | tee hc-control-bot-report.json

      - name: Run trusted stale baseline scanner on PR documentation data
        run: |
          set +e
          scan_root="${RUNNER_TEMP}/hc-stale-baseline-scan-root"
          rm -rf "${scan_root}"
          mkdir -p "${scan_root}"

          for file in pyproject.toml requirements.txt; do
            if [ -f "trusted-base/${file}" ]; then
              mkdir -p "${scan_root}/$(dirname "${file}")"
              cp "trusted-base/${file}" "${scan_root}/${file}"
            fi
          done

          if [ -d trusted-base/.github/workflows ]; then
            mkdir -p "${scan_root}/.github"
            cp -R trusted-base/.github/workflows "${scan_root}/.github/workflows"
          fi

          mkdir -p "${scan_root}/docs"
          if [ -d pr-docs-data/docs ]; then
            (cd pr-docs-data && find docs -type f -name '*.md' -print0) | while IFS= read -r -d '' doc; do
              mkdir -p "${scan_root}/$(dirname "${doc}")"
              cp "pr-docs-data/${doc}" "${scan_root}/${doc}"
            done
          fi

          {
            echo "## HC Stale Baseline Scanner"
            echo
            echo "- Scanner implementation: trusted base revision ${{ github.event.pull_request.base.sha }}."
            echo "- Documentation scan input: proposed PR documentation from docs/**/*.md copied as data only."
            echo "- Trusted baseline inputs: base pyproject.toml, requirements.txt, and .github/workflows/** when present."
            echo "- Boundary: advisory/report-only; missing-boundary findings do not fail CI by default."
            echo "- Boundary: no PR-branch scripts, workflows, or governance files are executed or trusted as instructions."
            echo "- advisory_only=true"
            echo "- public_safe=true"
            echo "- truth_guarantee=false"
            echo "- human_review_required=true"
            echo
          } > trusted-base/hc-stale-baseline-scanner.md

          python trusted-base/scripts/hc_stale_baseline_report.py --repo-root "${scan_root}" --markdown >> trusted-base/hc-stale-baseline-scanner.md 2> trusted-base/hc-stale-baseline-scanner.err
          scanner_status=$?
          if [ "${scanner_status}" -ne 0 ]; then
            {
              echo
              echo "> Warning: trusted stale baseline scanner exited with status ${scanner_status}. This is a warning only, not a trust claim."
              if [ -s trusted-base/hc-stale-baseline-scanner.err ]; then
                echo
                echo '```text'
                cat trusted-base/hc-stale-baseline-scanner.err
                echo '```'
              fi
            } >> trusted-base/hc-stale-baseline-scanner.md
          fi
          cat trusted-base/hc-stale-baseline-scanner.md >> "${GITHUB_STEP_SUMMARY}"
          exit 0

      - name: Add HC Review Window status
        working-directory: trusted-base
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          observed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          eligible_after=$(date -u -d "${observed_at} + 90 seconds" +%Y-%m-%dT%H:%M:%SZ)
          cat > hc-review-window-status.md <<EOF
          ## HC Review Window Status

          - Head SHA: ${HEAD_SHA}
          - Observed at: ${observed_at}
          - Eligible after: ${eligible_after}
          - Status: waiting for late Codex review/comments before HC Trust Engineer may report merge-readiness
          - Boundary: Checks are not delayed by this timer.
          - Boundary: Merge still requires final HC Trust Engineer review and explicit maintainer command.
          - advisory_only=true
          - public_safe=true
          - truth_guarantee=false
          - human final authority remains required
          EOF
          cat hc-review-window-status.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: hc-control-bot-report-${{ github.event_name }}
          path: |
            trusted-base/hc-control-bot-report.json
            trusted-base/hc-control-bot-changed-paths.txt
            trusted-base/hc-workflow-taxonomy-drift.md
            trusted-base/hc-review-window-status.md
            trusted-base/hc-stale-baseline-scanner.md
          if-no-files-found: error
