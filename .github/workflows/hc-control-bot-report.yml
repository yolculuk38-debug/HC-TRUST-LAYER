name: HC Control Bot Report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: hc-control-bot-report-${{ github.event.pull_request.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  report:
    name: HC Control Bot report-only scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Collect changed file paths from GitHub API
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          page = 1
          filenames = []

          while True:
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  items = json.loads(response.read().decode("utf-8"))

              if not items:
                  break

              filenames.extend(item["filename"] for item in items)
              page += 1

          with open("hc-control-bot-changed-paths.txt", "w", encoding="utf-8") as handle:
              for filename in filenames:
                  handle.write(filename + "\n")

          print(f"Collected {len(filenames)} changed path(s).")
          PY

      - name: Run deterministic scanner
        run: |
          python scripts/hc_control_bot.py --pretty $(cat hc-control-bot-changed-paths.txt) | tee hc-control-bot-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: hc-control-bot-report-${{ github.event_name }}
          path: |
            hc-control-bot-report.json
            hc-control-bot-changed-paths.txt
          if-no-files-found: error
