name: Safe Auto Merge
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.
# Governance boundary: this workflow is report-only. It must never enable, disable, or perform a PR merge.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_run:
    workflows: ["Automation Gate"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Report auto-merge boundary without mutating PR state
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          echo "Labels: $LABELS"
          echo "Draft: $IS_DRAFT"
          echo "Automatic merge is disabled by HC governance."
          echo "Human review required."
          echo "Human merge required."
