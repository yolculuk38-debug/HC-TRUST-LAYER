name: Safe Auto Merge
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_run:
    workflows: ["Automation Gate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  enable:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enable low-risk auto merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          echo "Labels: $LABELS"
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Draft PR: auto merge disabled."
            exit 0
          fi
          if echo "$LABELS" | grep -q "manual-review"; then
            echo "manual-review label present: auto merge disabled."
            exit 0
          fi
          if echo "$LABELS" | grep -q "auto-merge"; then
            gh pr merge "$PR_URL" --auto --squash
          else
            echo "auto-merge label missing: no action."
          fi
