name: Safe Auto Merge
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_run:
    workflows: ["Automation Gate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  enable:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Enable low-risk auto merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          echo "Labels: $LABELS"

          has_label() {
            local needle="$1"
            LABELS_CSV="$LABELS" python - "$needle" <<'PY'
          import os
          import sys

          needle = sys.argv[1]
          labels = [label.strip() for label in os.environ.get("LABELS_CSV", "").split(",") if label.strip()]
          raise SystemExit(0 if needle in labels else 1)
          PY
          }

          disable_auto_merge() {
            if [ "$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')" = "true" ]; then
              gh pr merge "$PR_URL" --disable-auto
            else
              echo "Auto-merge already disabled."
            fi
          }

          protected_path_touched() {
            local files
            local path
            files="$(mktemp)"
            if ! gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --jq '.[].filename' > "$files"; then
              echo "Unable to inspect PR files; disabling auto-merge eligibility."
              rm -f "$files"
              return 0
            fi
            while IFS= read -r path; do
              case "$path" in
                CODEOWNERS|protocol-graph.json|verification-map.json|trust-kernel-index.json|schema/*|validators/*|signatures/*|policy/*|federation/*|records/*|.github/workflows/*|src/hc_runtime/*)
                  echo "$path"
                  rm -f "$files"
                  return 0
                  ;;
              esac
            done < "$files"
            rm -f "$files"
            return 1
          }

          if [ "$IS_DRAFT" = "true" ]; then
            echo "Draft PR: auto merge disabled."
            disable_auto_merge
            exit 0
          fi
          # Tier-1 restriction: manual-review always wins over auto-merge, including label conflicts.
          if has_label "manual-review"; then
            echo "manual-review label present: auto merge disabled."
            disable_auto_merge
            exit 0
          fi
          # Tier-1 protected surfaces require human-supervised validation and must not auto-merge.
          if protected_path_touched; then
            echo "Protected path touched: auto merge disabled."
            disable_auto_merge
            exit 0
          fi
          if has_label "auto-merge"; then
            gh pr merge "$PR_URL" --auto --squash
          else
            echo "auto-merge label missing: no action."
          fi
