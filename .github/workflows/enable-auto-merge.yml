name: Enable PR Auto-merge
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.
# Governance boundary: automatic merge enablement is disabled. This workflow is report-only.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  report-auto-merge-disabled:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - name: Report manual merge requirement
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          echo "Labels: $LABELS"
          echo "Draft: $IS_DRAFT"
          echo "Automatic merge enablement is disabled by HC-TRUST-LAYER governance."
          echo "Human review required."
          echo "Human merge required."
