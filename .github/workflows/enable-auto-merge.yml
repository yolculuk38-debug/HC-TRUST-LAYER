name: Enable PR Auto-merge
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write


concurrency:
  # Keep one execution lane per PR, but do not cancel in-flight runs.
  # Cancelled runs can leave auto-merge disabled even when required checks later pass.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  enable-auto-merge:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge when labeled
        if: >-
          contains(github.event.pull_request.labels.*.name, 'automerge') ||
          contains(github.event.pull_request.labels.*.name, 'auto-merge')
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
