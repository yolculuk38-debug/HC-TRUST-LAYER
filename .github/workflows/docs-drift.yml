name: Docs Drift Check
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      # Keep pull_request coverage broad, but limit post-merge main-push runs to files inspected by the drift checker
      # or to evidence path groups whose existence can be validated from implementation/capability docs.
      - README.md
      - docs/**/*.md
      - scripts/check_docs_drift.py
      - src/**/*.py
      - tests/test_*.py
      - schema/**
      - examples/**
      - .github/workflows/*.yml

permissions:
  contents: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-drift:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run documentation drift check
        run: python3 scripts/check_docs_drift.py
