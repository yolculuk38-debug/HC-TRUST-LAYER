name: HC Assistant Command Listener

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: hc-assistant-command-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  command-listener:
    name: HC Assistant command listener
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.event.comment.body, '/hc')

    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Parse HC assistant command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          SOURCE_COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts.hc_assistant_command import parse_hc_command

          raw_body = os.environ.get("COMMENT_BODY", "")
          first_line = raw_body.splitlines()[0].strip() if raw_body.strip() else ""
          result = parse_hc_command(first_line).to_dict()
          source_comment_id = os.environ.get("SOURCE_COMMENT_ID", "unknown")

          Path("hc-assistant-command-result.json").write_text(
              json.dumps(result, indent=2, sort_keys=True),
              encoding="utf-8",
          )

          response_lines = result.get("response_lines", [])
          warnings = result.get("warnings", [])

          rendered = [
              f"<!-- hc-assistant-command-response:{source_comment_id} -->",
              "## HC Assistant response",
              "",
              f"- command: `{result.get('command', 'unknown')}`",
              f"- implemented: `{str(result.get('implemented')).lower()}`",
              f"- advisory_only: `{str(result.get('advisory_only')).lower()}`",
              f"- public_safe: `{str(result.get('public_safe')).lower()}`",
              f"- truth_guarantee: `{str(result.get('truth_guarantee')).lower()}`",
              f"- human_review_required: `{str(result.get('human_review_required')).lower()}`",
              "",
              "### Response",
              "",
          ]

          if response_lines:
              rendered.extend(f"- {line}" for line in response_lines)
          else:
              rendered.append("- No response lines were produced.")

          if warnings:
              rendered.extend(["", "### Warnings", ""])
              rendered.extend(f"- {warning}" for warning in warnings)

          rendered.extend([
              "",
              "### Boundary",
              "",
              "This response is advisory-only and public-safe.",
              "It is not approval, rejection, merge authority, legal advice, production readiness, forensic certainty, or a truth guarantee.",
              "Human maintainers retain final authority.",
          ])

          Path("hc-assistant-command-response.md").write_text(
              "\n".join(rendered) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload command response artifact
        uses: actions/upload-artifact@v7
        with:
          name: hc-assistant-command-response-${{ github.event.comment.id }}
          path: |
            hc-assistant-command-result.json
            hc-assistant-command-response.md
          if-no-files-found: error
          retention-days: 14

      - name: Post advisory command response
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SOURCE_COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          repo = os.environ["REPOSITORY"]
          issue_number = os.environ["ISSUE_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          source_comment_id = os.environ["SOURCE_COMMENT_ID"]
          marker = f"<!-- hc-assistant-command-response:{source_comment_id} -->"

          body = Path("hc-assistant-command-response.md").read_text(encoding="utf-8")
          list_url = f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments?per_page=100"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          try:
              request = urllib.request.Request(list_url, headers=headers)
              with urllib.request.urlopen(request, timeout=20) as response:
                  comments = json.loads(response.read().decode("utf-8"))

              existing = next((item for item in comments if marker in item.get("body", "")), None)
              payload = json.dumps({"body": body}).encode("utf-8")

              if existing:
                  url = existing["url"]
                  method = "PATCH"
              else:
                  url = list_url
                  method = "POST"

              request = urllib.request.Request(url, data=payload, headers=headers, method=method)
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(f"HC assistant command response {method} completed with status {response.status}.")
          except urllib.error.HTTPError as exc:
              print(f"::warning::HC assistant command response skipped: GitHub API returned HTTP {exc.code}.")
              sys.exit(0)
          except Exception as exc:
              print(f"::warning::HC assistant command response skipped: {exc}")
              sys.exit(0)
          PY
