name: Advisory Policy Evaluation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  advisory-policy-evaluation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect changed paths
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_paths.txt
          if [ ! -s changed_paths.txt ]; then
            echo "README.md" > changed_paths.txt
          fi
          echo "Changed paths for advisory policy workflow:"
          cat changed_paths.txt

      - name: Run advisory policy evaluator
        id: evaluator
        run: |
          mapfile -t CHANGED_PATHS < changed_paths.txt
          set +e
          python3 scripts/evaluate_policy.py "${CHANGED_PATHS[@]}" | tee policy_output.txt
          EVAL_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$EVAL_EXIT" -ne 0 ]; then
            echo "::warning::Advisory policy evaluation parsing failure detected; defaulting recommendation to human_review_required."
            cat <<'EOF' > policy_summary.txt
risk_level=high
affected_categories=unknown
recommended_merge_outcome=human_review_required
notes=Evaluator parsing failure fallback activated.
EOF
            exit 0
          fi

          if grep -q '^- unknown: [1-9]' policy_output.txt; then
            echo "::warning::Unknown path classifications detected; defaulting recommendation to human_review_required."
          fi

          python3 - <<'PY'
from pathlib import Path
import re

text = Path('policy_output.txt').read_text(encoding='utf-8')
recommended = re.search(r"- (auto_merge_allowed|conditional_merge|human_review_required|blocked)", text)
outcome = recommended.group(1) if recommended else "human_review_required"

count_map = {}
for category in ("blocked", "high", "medium", "low", "unknown"):
    m = re.search(rf"- {category}: (\d+)", text)
    count_map[category] = int(m.group(1)) if m else 0

affected = [k for k, v in count_map.items() if v > 0]
if count_map.get("unknown", 0) > 0:
    outcome = "human_review_required"

if count_map["blocked"] > 0:
    risk_level = "blocked"
elif count_map["high"] > 0 or count_map["unknown"] > 0:
    risk_level = "high"
elif count_map["medium"] > 0:
    risk_level = "medium"
else:
    risk_level = "low"

Path('policy_summary.txt').write_text(
    "\n".join(
        [
            f"risk_level={risk_level}",
            f"affected_categories={','.join(affected) if affected else 'none'}",
            f"recommended_merge_outcome={outcome}",
            "notes=Advisory policy evaluation only; no merge enforcement applied.",
        ]
    ) + "\n",
    encoding='utf-8',
)
PY

      - name: Print advisory merge-risk summary
        run: |
          echo "HC-TRUST-LAYER advisory policy workflow summary"
          cat policy_summary.txt
          echo "\nRecommended merge outcomes reference:"
          echo "- auto_merge_allowed"
          echo "- conditional_merge"
          echo "- human_review_required"
          echo "- blocked"
          echo "\nAdvisory-only: this policy workflow does not block merges, modify branch protections, auto-close PRs, or auto-merge PRs."
