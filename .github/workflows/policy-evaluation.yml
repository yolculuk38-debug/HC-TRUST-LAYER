name: Advisory Policy Evaluation
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  advisory-policy-evaluation:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect changed paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          # On pull_request events, github.sha is typically a synthetic merge commit
          # with parent1=base and parent2=head. Diffing parents is deterministic and
          # avoids missing-object failures for fork SHAs on hosted runners.
          if git rev-parse --verify HEAD^1 >/dev/null 2>&1 && git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            git diff --name-only HEAD^1 HEAD^2 > changed_paths.txt
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_paths.txt
          fi

          if [ ! -s changed_paths.txt ]; then
            echo "README.md" > changed_paths.txt
          fi
          echo "Changed paths for advisory policy workflow:"
          cat changed_paths.txt

      - name: Run advisory policy evaluator
        id: evaluator
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t CHANGED_PATHS < changed_paths.txt
          set +e
          python3 scripts/evaluate_policy.py "${CHANGED_PATHS[@]}" | tee policy_output.txt
          EVAL_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$EVAL_EXIT" -ne 0 ]; then
            echo "::warning::Advisory policy evaluation parsing failure detected; defaulting recommendation to human_review_required."
            printf '%s\n' \
              'risk_level=high' \
              'affected_categories=unknown' \
              'recommended_merge_outcome=human_review_required' \
              'notes=Evaluator parsing failure fallback activated.' \
              > policy_summary.txt
            exit 0
          fi

          if grep -q '^- unknown: [1-9]' policy_output.txt; then
            echo "::warning::Unknown path classifications detected; defaulting recommendation to human_review_required."
          fi

          blocked_count=$(sed -n 's/^- blocked: \([0-9][0-9]*\)$/\1/p' policy_output.txt | head -n1)
          high_count=$(sed -n 's/^- high: \([0-9][0-9]*\)$/\1/p' policy_output.txt | head -n1)
          medium_count=$(sed -n 's/^- medium: \([0-9][0-9]*\)$/\1/p' policy_output.txt | head -n1)
          low_count=$(sed -n 's/^- low: \([0-9][0-9]*\)$/\1/p' policy_output.txt | head -n1)
          unknown_count=$(sed -n 's/^- unknown: \([0-9][0-9]*\)$/\1/p' policy_output.txt | head -n1)

          blocked_count=${blocked_count:-0}
          high_count=${high_count:-0}
          medium_count=${medium_count:-0}
          low_count=${low_count:-0}
          unknown_count=${unknown_count:-0}

          outcome=$(sed -n 's/^- \(auto_merge_allowed\|conditional_merge\|human_review_required\|blocked\)$/\1/p' policy_output.txt | head -n1)
          outcome=${outcome:-human_review_required}

          if [ "$unknown_count" -gt 0 ]; then
            outcome="human_review_required"
          fi

          if [ "$blocked_count" -gt 0 ]; then
            risk_level="blocked"
          elif [ "$high_count" -gt 0 ] || [ "$unknown_count" -gt 0 ]; then
            risk_level="high"
          elif [ "$medium_count" -gt 0 ]; then
            risk_level="medium"
          else
            risk_level="low"
          fi

          affected_categories=""
          for category in blocked high medium low unknown; do
            count_var="${category}_count"
            count_value=${!count_var}
            if [ "$count_value" -gt 0 ]; then
              if [ -n "$affected_categories" ]; then
                affected_categories="$affected_categories,$category"
              else
                affected_categories="$category"
              fi
            fi
          done
          affected_categories=${affected_categories:-none}

          printf '%s\n' \
            "risk_level=$risk_level" \
            "affected_categories=$affected_categories" \
            "recommended_merge_outcome=$outcome" \
            "notes=Advisory policy evaluation only; no merge enforcement applied." \
            > policy_summary.txt

      - name: Print advisory merge-risk summary
        shell: bash
        run: |
          set -euo pipefail
          echo "HC-TRUST-LAYER advisory policy workflow summary"
          cat policy_summary.txt
          echo "\nRecommended merge outcomes reference:"
          echo "- auto_merge_allowed"
          echo "- conditional_merge"
          echo "- human_review_required"
          echo "- blocked"
          echo "\nAdvisory-only: this policy workflow does not block merges, modify branch protections, auto-close PRs, or auto-merge PRs."
