name: Automation Gate
# Security hardening defaults: least-privilege token scopes, deterministic concurrency, and bounded runtime.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: read
  issues: write


concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate executions and non-deterministic outcomes.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    # Bound workflow runtime to reduce abuse/DoS risk from stalled jobs.
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    steps:
      - name: Upsert HC Review Window marker
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          observed_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          eligible_after="$(date -u -d "${observed_at} + 90 seconds" +"%Y-%m-%dT%H:%M:%SZ")"

          body="$(cat <<EOF
<!-- hc-review-window -->
👀 ⏳ HC Review Window
- Head SHA: ${HEAD_SHA}
- Observed at: ${observed_at}
- Eligible after: ${eligible_after}
- Status: waiting for late Codex review/comments before HC Trust Engineer may report merge-readiness
- Checks are not delayed by this timer
- Merge still requires final HC Trust Engineer review and explicit maintainer command
EOF
)"

          mapfile -t marker_comment_ids < <(
            gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.body | contains("<!-- hc-review-window -->")) | .id'
          )

          if [ "${#marker_comment_ids[@]}" -eq 0 ]; then
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="${body}" >/dev/null
          else
            gh api -X PATCH "repos/${REPO}/issues/comments/${marker_comment_ids[0]}" -f body="${body}" >/dev/null
            for duplicate_id in "${marker_comment_ids[@]:1}"; do
              gh api -X DELETE "repos/${REPO}/issues/comments/${duplicate_id}" >/dev/null
            done
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require PR title and body
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          test -n "$PR_TITLE"
          test -n "$PR_BODY"

      - name: Block generated binary files
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed_files.txt
          cat changed_files.txt
          if grep -Eq '\.(png|jpg|jpeg|gif|webp|zip|exe|dll|so|dylib)$' changed_files.txt; then
            echo "Generated binary files are not allowed in automation PRs."
            exit 1
          fi
          echo "No blocked file types detected."

      - name: Python syntax check
        run: python -m compileall src
