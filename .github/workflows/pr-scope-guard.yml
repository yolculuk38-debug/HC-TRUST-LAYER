name: PR Scope Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same ref to prevent duplicate advisory checks.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-scope-guard:
    name: Advisory PR scope boundary guard
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run advisory scope boundary checker
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 scripts/check_pr_scope.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --head-ref "${{ github.event.pull_request.head.sha }}"

      - name: Human-supervised validation reminder
        run: |
          echo "PR scope guard is advisory-only in this phase."
          echo "Human-supervised validation and reviewer authority are preserved."
