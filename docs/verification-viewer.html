<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HC:// MVP-1 Static Verification Package Viewer (Demo)</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #161d33;
      --text: #e6ebff;
      --muted: #a8b1d9;
      --pass: #27c47c;
      --warn: #ffbf3f;
      --fail: #ff6b6b;
      --border: #2b355d;
      --chip: #243058;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1rem; }
    .warn { background: #3a1f1f; border: 1px solid #8c3a3a; padding: .75rem; border-radius: .5rem; }
    .controls { margin: 1rem 0; display: grid; gap: .6rem; }
    .control-row { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; }
    .control-row button { min-height: 2.7rem; }
    .control-row button:disabled { opacity: .5; cursor: not-allowed; }
    select, button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: .5rem; padding: .65rem .75rem; font-size: 1rem;
    }
    input[type="file"] {
      width: 100%;
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: .5rem; padding: .55rem .75rem; font-size: .95rem;
    }
    button { cursor: pointer; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: .75rem; padding: .9rem; margin-bottom: .8rem; }
    h1, h2 { margin: .1rem 0 .7rem; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .result { display: inline-block; padding: .25rem .6rem; border-radius: 999px; font-weight: 700; }
    .PASS { background: rgba(39,196,124,.2); color: var(--pass); }
    .WARNING { background: rgba(255,191,63,.2); color: var(--warn); }
    .FAIL { background: rgba(255,107,107,.2); color: var(--fail); }
    .grid { display: grid; gap: .8rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    ul { margin: 0; padding-left: 1.1rem; }
    .chip { display: inline-block; background: var(--chip); border: 1px solid var(--border); border-radius: .4rem; padding: .15rem .45rem; margin: .1rem .15rem .1rem 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; word-break: break-all; }
    .muted { color: var(--muted); }
    .explain { margin-top: .65rem; padding: .7rem; border: 1px solid var(--border); border-radius: .55rem; background: rgba(11,16,32,.45); }
    .stack { display: grid; gap: .5rem; }
    .kicker { font-size: .85rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    details summary { cursor: pointer; font-weight: 700; }
    .raw-warning { margin: .5rem 0 .75rem; padding: .6rem; border-radius: .5rem; border: 1px solid #8c6f2b; background: rgba(255,191,63,.12); color: #ffe4a6; }
    .raw-json { margin: .6rem 0 0; padding: .8rem; border-radius: .5rem; border: 1px solid var(--border); background: #0d1428; overflow-x: auto; white-space: pre; line-height: 1.4; font-size: .9rem; }
    .raw-actions { margin-top: .6rem; display: flex; flex-wrap: wrap; gap: .6rem; }
    .timeline { margin: 0; padding: 0; list-style: none; display: grid; gap: .65rem; }
    .timeline-item { border: 1px solid var(--border); border-radius: .55rem; padding: .65rem; background: rgba(11,16,32,.4); }
    .timeline-meta { display: flex; flex-wrap: wrap; gap: .35rem .6rem; color: var(--muted); font-size: .92rem; }
    .label { font-weight: 700; color: var(--muted); margin-right: .2rem; }
    .advisory { border-left: 3px solid #8c6f2b; padding: .5rem .65rem; border-radius: .35rem; background: rgba(255,191,63,.1); margin: .4rem 0; }
    @media (max-width: 680px) {
      .card { padding: .8rem; }
      .timeline-item { padding: .6rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>HC:// MVP-1 Static Verification Package Viewer</h1>
    <p class="warn"><strong>Demo-only warning:</strong> This viewer is advisory only, performs local processing only, performs no server upload, provides no truth guarantee, and human review is recommended.</p>

    <div class="controls card">
      <label for="exampleSelect"><strong>Select example package</strong></label>
      <select id="exampleSelect"></select>
      <div class="control-row">
        <button id="reloadBtn" type="button">Reload selected package</button>
        <button id="resetBtn" type="button">Reset to selected example</button>
      </div>
      <div class="control-row">
        <button id="copyPackageBtn" type="button">Copy current package JSON</button>
        <button id="downloadPackageBtn" type="button">Download current package JSON</button>
      </div>
      <div class="control-row">
        <button id="printReportBtn" type="button">Print report</button>
        <button id="exportSummaryBtn" type="button">Export report summary (.txt)</button>
      </div>
      <p class="muted" id="packageActionStatus">No package action yet.</p>
      <label for="localUpload"><strong>Or load local verification package JSON</strong></label>
      <input id="localUpload" type="file" accept=".json,application/json" />
      <p class="muted" id="uploadStatus">Viewing bundled example package.</p>
      <p class="muted">Source path: <span id="selectedPath" class="mono"></span></p>
    </div>

    <section id="content"></section>
  </main>

  <script>
    const EXAMPLES = [
      { label: 'Verified trace', hash: 'verified-trace', file: '../examples/verification-packages/verified-trace-example.json' },
      { label: 'Partial trace', hash: 'partial-trace', file: '../examples/verification-packages/partial-trace-example.json' },
      { label: 'Replay warning', hash: 'replay-warning', file: '../examples/verification-packages/replay-warning-example.json' },
      { label: 'Disputed', hash: 'disputed', file: '../examples/verification-packages/disputed-example.json' },
      { label: 'Unverified', hash: 'unverified', file: '../examples/verification-packages/unverified-example.json' }
    ];

    const select = document.getElementById('exampleSelect');
    const selectedPath = document.getElementById('selectedPath');
    const content = document.getElementById('content');
    const uploadStatus = document.getElementById('uploadStatus');
    const localUpload = document.getElementById('localUpload');
    const copyPackageBtn = document.getElementById('copyPackageBtn');
    const downloadPackageBtn = document.getElementById('downloadPackageBtn');
    const packageActionStatus = document.getElementById('packageActionStatus');
    const printReportBtn = document.getElementById('printReportBtn');
    const exportSummaryBtn = document.getElementById('exportSummaryBtn');
    let currentPackage = null;
    let activeBundledHash = EXAMPLES[0].hash;
    const REQUIRED_FIELDS = [
      'package_id',
      'trust_result',
      'trust_confidence',
      'provenance_summary',
      'provenance_timeline',
      'validator_reviews',
      'replay_indicators',
      'dispute_indicators',
      'audit_snapshot'
    ];

    function safe(value, fallback = 'unknown') {
      return value === undefined || value === null || value === '' ? fallback : value;
    }

    function getCurrentHashValue() {
      return window.location.hash ? window.location.hash.slice(1).trim().toLowerCase() : '';
    }

    function findExampleIndexByHash(hashValue) {
      if (!hashValue) return -1;
      return EXAMPLES.findIndex((entry) => entry.hash === hashValue);
    }

    function setHashForExample(entry) {
      if (!entry?.hash) return;
      if (getCurrentHashValue() !== entry.hash) {
        window.location.hash = entry.hash;
      }
    }

    function clearDemoHashIfActive() {
      const currentHash = getCurrentHashValue();
      if (findExampleIndexByHash(currentHash) !== -1) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }

    function renderList(items, formatFn) {
      if (!Array.isArray(items) || items.length === 0) return '<p class="muted">No entries listed in this package.</p>';
      return '<ul>' + items.map((it) => `<li>${formatFn(it)}</li>`).join('') + '</ul>';
    }

    const ALLOWED_TRUST_RESULTS = ['VERIFIED TRACE', 'PARTIAL TRACE', 'REPLAY WARNING', 'DISPUTED', 'UNVERIFIED'];
    const SHA256_HEX_RE = /^[0-9a-f]{64}$/;

    function isHumanReadableConfidence(value) {
      return typeof value === 'string' && /[A-Za-z]/.test(value) && value.trim().length >= 3;
    }

    function normalizeTrustResult(value, fallback = 'UNVERIFIED') {
      if (typeof value !== 'string') return fallback;
      const normalized = value.trim().toUpperCase();
      return normalized || fallback;
    }

    function getPackageWarnings(pkg) {
      const missingFields = REQUIRED_FIELDS.filter((field) => pkg[field] === undefined || pkg[field] === null);
      const warnings = [];
      if (missingFields.length > 0) warnings.push(`Missing required field(s): ${missingFields.join(', ')}`);

      if (!ALLOWED_TRUST_RESULTS.includes(normalizeTrustResult(pkg.trust_result, ''))) {
        warnings.push('trust_result should be one of: VERIFIED TRACE, PARTIAL TRACE, REPLAY WARNING, DISPUTED, UNVERIFIED.');
      }
      if (!SHA256_HEX_RE.test(safe(pkg.content_hash, ''))) {
        warnings.push('content_hash should match lowercase SHA-256 hex format (64 hex characters).');
      }
      if (!isHumanReadableConfidence(pkg.trust_confidence)) {
        warnings.push('trust_confidence should be present and human-readable.');
      }
      ['provenance_timeline', 'validator_reviews', 'replay_indicators', 'dispute_indicators'].forEach((field) => {
        if (!Array.isArray(pkg[field])) warnings.push(`${field} should be an array.`);
      });
      return warnings;
    }


    function safePackageFilename(pkg) {
      const base = safe(pkg?.package_id, 'verification-package').toLowerCase();
      const normalized = base.replace(/[^a-z0-9._-]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 80);
      const stem = normalized || 'verification-package';
      return `${stem}.json`;
    }

    

    function safeReportFilename(pkg) {
      const base = safe(pkg?.package_id, 'verification-package-report').toLowerCase();
      const normalized = base.replace(/[^a-z0-9._-]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 80);
      const stem = normalized || 'verification-package-report';
      return `${stem}-report-summary.txt`;
    }

    function buildReportSummaryText(pkg, packageWarnings) {
      const replayDetected = Array.isArray(pkg.replay_indicators) && pkg.replay_indicators.length > 0;
      const disputeActive = Array.isArray(pkg.dispute_indicators) && pkg.dispute_indicators.length > 0;
      const humanReviewRequired = !!pkg.human_review_required;
      const validatorText = Array.isArray(pkg.validator_reviews) && pkg.validator_reviews.length > 0
        ? pkg.validator_reviews.map((r, idx) => `${idx + 1}. ${safe(r.validator_id)} | ${safe(r.decision)} | ${safe(r.reviewed_at)} | ${safe(r.notes)}`).join('\n')
        : 'None listed.';
      const auditSnapshot = pkg.audit_snapshot || {};
      return [
        'HC:// Verification Package Viewer Report (Demo-Only)',
        'HC-TRUST-LAYER static viewer output: advisory only.',
        '',
        `package_id: ${safe(pkg.package_id)}`,
        `trust_result: ${safe(pkg.trust_result, 'UNVERIFIED')}`,
        `trust_confidence: ${safe(pkg.trust_confidence)}`,
        `content_hash: ${safe(pkg.content_hash)}`,
        `provenance summary: ${safe(pkg.provenance_summary)}`,
        `replay indicators: ${replayDetected ? 'Replay warning present' : 'No replay warning shown'}`,
        `dispute indicators: ${disputeActive ? 'Dispute indicator present' : 'No active dispute shown'}`,
        'validator reviews:',
        validatorText,
        `audit snapshot: trail_ref=${safe(auditSnapshot.audit_trail_ref)}; last_event=${safe(auditSnapshot.last_event)}; review_boundary=${safe(auditSnapshot.review_boundary)}` ,
        `human review required: ${humanReviewRequired ? 'Yes' : 'No explicit review flag in this package'}`,
        `viewer warnings: ${packageWarnings.length > 0 ? packageWarnings.join(' | ') : 'None'}`,
        '',
        'Local-only processing note: this report is generated in-browser with no server upload path.',
        'Human-supervised validation note: consequential trust decisions require human-supervised validation.'
      ].join('\n');
    }

    let actionStatusTimer = null;

    function setPackageActionStatus(message, clearAfterMs = 2800) {
      packageActionStatus.textContent = message;
      if (actionStatusTimer) clearTimeout(actionStatusTimer);
      if (clearAfterMs > 0) {
        actionStatusTimer = setTimeout(() => {
          packageActionStatus.textContent = 'No package action yet.';
          actionStatusTimer = null;
        }, clearAfterMs);
      }
    }

    function updateActionButtons() {
      const disabled = !currentPackage;
      copyPackageBtn.disabled = disabled;
      downloadPackageBtn.disabled = disabled;
      printReportBtn.disabled = disabled;
      exportSummaryBtn.disabled = disabled;
    }

    async function copyCurrentPackageJson() {
      if (!currentPackage) {
        setPackageActionStatus('No package loaded to copy.');
        return;
      }
      const text = JSON.stringify(currentPackage, null, 2);
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const tempArea = document.createElement('textarea');
          tempArea.value = text;
          tempArea.setAttribute('readonly', 'readonly');
          tempArea.style.position = 'fixed';
          tempArea.style.left = '-9999px';
          document.body.appendChild(tempArea);
          tempArea.select();
          document.execCommand('copy');
          document.body.removeChild(tempArea);
        }
        setPackageActionStatus('Package JSON copied locally.');
      } catch (error) {
        setPackageActionStatus(`Copy failed: ${safe(error.message)}`);
      }
    }

    function downloadCurrentPackageJson() {
      if (!currentPackage) {
        setPackageActionStatus('No package loaded to download.');
        return;
      }
      try {
        const blob = new Blob([JSON.stringify(currentPackage, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = safePackageFilename(currentPackage);
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setPackageActionStatus(`Downloaded ${link.download}.`);
      } catch (error) {
        setPackageActionStatus(`Download failed: ${safe(error.message)}`);
      }
    }

    

    function printCurrentReport() {
      if (!currentPackage) {
        setPackageActionStatus('No package loaded to print.');
        return;
      }
      try {
        window.print();
        setPackageActionStatus('Opened browser print dialog for current report.');
      } catch (error) {
        setPackageActionStatus(`Print failed: ${safe(error.message)}`);
      }
    }

    function exportCurrentSummaryText() {
      if (!currentPackage) {
        setPackageActionStatus('No package loaded to export.');
        return;
      }
      try {
        const warnings = getPackageWarnings(currentPackage);
        const reportText = buildReportSummaryText(currentPackage, warnings);
        const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = safeReportFilename(currentPackage);
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setPackageActionStatus(`Exported ${link.download}.`);
      } catch (error) {
        setPackageActionStatus(`Export failed: ${safe(error.message)}`);
      }
    }


    function renderRawPackageFields(pkg) {
      if (!pkg) {
        return `
          <article class="card">
            <h2>Raw Package Fields</h2>
            <p class="muted">No package is currently loaded. Select a bundled example or load a local JSON package to inspect raw fields.</p>
          </article>
        `;
      }
      const prettyJson = safe(JSON.stringify(pkg, null, 2));
      return `
        <article class="card">
          <h2>Raw Package Fields</h2>
          <details>
            <summary>Show raw structured package JSON (technical detail)</summary>
            <p class="raw-warning"><strong>Technical detail warning:</strong> Raw package JSON is an implementation-level view for inspection only and still requires human-supervised validation.</p>
            <p class="muted">Local-only boundary: the viewer renders this raw JSON in-browser, does not upload it, does not store local uploads, and does not modify package content.</p>
            <div class="raw-actions">
              <button type="button" id="copyRawJsonBtn">Copy raw JSON</button>
            </div>
            <pre class="mono raw-json">${prettyJson}</pre>
          </details>
        </article>
      `;
    }
    function renderEmptyState(message) {
      return `<p class="muted">${safe(message)}</p>`;
    }
    function renderTimeline(items, formatFn, emptyMessage) {
      if (!Array.isArray(items) || items.length === 0) return renderEmptyState(emptyMessage);
      return `<ol class="timeline">${items.map((it, idx) => `<li class="timeline-item">${formatFn(it, idx)}</li>`).join('')}</ol>`;
    }

    function renderPackage(pkg, packageSourceLabel = 'Bundled example package') {
      currentPackage = pkg;
      updateActionButtons();
      const trustResult = normalizeTrustResult(pkg.trust_result);
      const packageWarnings = getPackageWarnings(pkg);
      const trustClass = packageWarnings.length > 0 ? 'WARNING' : 'PASS';
      const replayDetected = Array.isArray(pkg.replay_indicators) && pkg.replay_indicators.length > 0;
      const disputeActive = Array.isArray(pkg.dispute_indicators) && pkg.dispute_indicators.length > 0;
      const humanReviewRequired = !!pkg.human_review_required;
      const confidence = safe(pkg.trust_confidence);
      const warningHtml = packageWarnings.length > 0
        ? `<article class="card"><h2>Package Warnings</h2>${renderList(packageWarnings, (w) => safe(w))}</article>`
        : '';

      let summaryLabel = 'Human review required';
      let summaryMeaning = 'This package requires human-supervised validation before consequential trust decisions.';
      if (trustResult === 'VERIFIED TRACE' && !replayDetected && !disputeActive && !humanReviewRequired) {
        summaryLabel = 'Verified trace';
        summaryMeaning = 'Visible verification signals align within this package scope, with no active replay or dispute signal shown.';
      } else if (trustResult === 'PARTIAL TRACE' && !replayDetected && !disputeActive) {
        summaryLabel = 'Partial trace';
        summaryMeaning = 'Some verification signals are present, but scope coverage is incomplete or uncertain.';
      } else if (replayDetected) {
        summaryLabel = 'Replay warning';
        summaryMeaning = 'A replay-related caution signal is present and should be reviewed before relying on this package.';
      } else if (disputeActive) {
        summaryLabel = 'Disputed';
        summaryMeaning = 'An active dispute signal is present, so trust interpretation is unresolved in current scope.';
      } else if (trustResult === 'UNVERIFIED') {
        summaryLabel = 'Unverified';
        summaryMeaning = 'Current package scope does not provide enough verification support for a stronger trust result.';
      }

      content.innerHTML = `
        ${warningHtml}
        <article class="card">
          <h2>Trust Result Card</h2>
          <p><strong>Package source:</strong> ${safe(packageSourceLabel)}</p>
          <p><strong>Package:</strong> <span class="mono">${safe(pkg.package_id)}</span></p>
          <p><span class="result ${trustClass}">${trustResult}</span></p>
          <p><strong>Result label:</strong> ${summaryLabel}</p>
          <p><strong>Trust confidence:</strong> ${confidence}</p>
          <p><strong>Human review status:</strong> ${humanReviewRequired ? 'Human review required' : 'No explicit review flag in this package'}</p>
          <div class="explain stack">
            <p class="kicker">What this result means</p>
            <p>${summaryMeaning}</p>
            <p class="kicker">Why this package may need review</p>
            <p>Trust confidence, replay indicators, dispute indicators, provenance continuity, and validator review context can be incomplete or contested and should be interpreted with human-supervised validation.</p>
            <p class="kicker">What users should not assume</p>
            <p>Do not assume production readiness, truth guarantees, or forensic certainty from this static viewer output.</p>
            <p class="kicker">Demo-only limitation</p>
            <p>This HC:// viewer is local-only, browser-only, reads bundled or uploaded local JSON, and does not include backend verification services.</p>
          </div>
        </article>

        <article class="card"><h2>Content Hash</h2><p class="mono">${safe(pkg.content_hash)}</p></article>

        <article class="card"><h2>Provenance Summary</h2><p>${safe(pkg.provenance_summary)}</p><p class="muted">Provenance explains where this package came from and how continuity appears in the visible audit trail scope.</p></article>

        <article class="card"><h2>[Timeline] Provenance Timeline</h2>
          <p class="muted">Simple timeline view for continuity reading on desktop and mobile. Advisory interpretation only.</p>
          ${renderTimeline(
            pkg.provenance_timeline,
            (e, idx) => `
              <p><span class="label">Step ${idx + 1}:</span><span class="chip">${safe(e.stage)}</span></p>
              <p>${safe(e.actor)}</p>
              <div class="timeline-meta">
                <span><span class="label">Timestamp:</span>${safe(e.timestamp)}</span>
                <span><span class="label">Status:</span>${safe(e.status)}</span>
              </div>
            `,
            'No provenance timeline entries are included in this package. Human-supervised validation is recommended before consequential decisions.'
          )}
        </article>

        <article class="card"><h2>[Reviews] Validator Review Summary</h2>
          <p class="muted">Validator reviews are advisory interpretation signals, not standalone certainty claims.</p>
          ${renderTimeline(
            pkg.validator_reviews,
            (r, idx) => `
              <p><span class="label">Review ${idx + 1}:</span><span class="chip">${safe(r.decision)}</span></p>
              <p>${safe(r.validator_id)}</p>
              <div class="timeline-meta"><span><span class="label">Reviewed at:</span>${safe(r.reviewed_at)}</span></div>
              <p class="muted">${safe(r.notes)}</p>
            `,
            'No validator review entries are listed in this package. Treat the viewer output as incomplete advisory context.'
          )}
        </article>

        <section class="grid">
          <article class="card"><h2>[Replay] Replay Warning Display</h2>
            <p><strong>Status:</strong> ${replayDetected ? 'Replay warning' : 'No replay warning shown'}</p>
            ${replayDetected ? '<p class="advisory"><strong>Advisory warning:</strong> Replay indicators are caution signals and require human-supervised validation.</p>' : ''}
            ${renderTimeline(
              pkg.replay_indicators,
              (d, idx) => `<p><span class="label">Signal ${idx + 1}:</span><span class="mono">${safe(typeof d === 'string' ? d : JSON.stringify(d))}</span></p>`,
              'No replay indicators are present in this package scope.'
            )}
          </article>

          <article class="card"><h2>[Dispute] Dispute Status Display</h2>
            <p><strong>Status:</strong> ${disputeActive ? 'Disputed' : 'No active dispute shown'}</p>
            ${disputeActive ? '<p class="advisory"><strong>Advisory warning:</strong> Dispute indicators mean interpretation is unresolved in current package scope.</p>' : ''}
            ${renderTimeline(
              pkg.dispute_indicators,
              (id, idx) => `<p><span class="label">Indicator ${idx + 1}:</span><span class="mono">${safe(typeof id === 'string' ? id : JSON.stringify(id))}</span></p>`,
              'No dispute indicators are present in this package scope.'
            )}
          </article>
        </section>

        <article class="card"><h2>[Audit] Audit Snapshot</h2>
          <p class="advisory"><strong>Advisory boundary:</strong> Audit snapshot values summarize visible package scope only and do not guarantee full canonical record continuity.</p>
          <p><strong>Audit trail ref:</strong> <span class="mono">${safe(pkg.audit_snapshot?.audit_trail_ref)}</span></p>
          <p><strong>Last event:</strong> ${safe(pkg.audit_snapshot?.last_event)}</p>
          <p><strong>Review boundary:</strong> ${safe(pkg.audit_snapshot?.review_boundary)}</p>
          <p><strong>Generated at:</strong> ${safe(pkg.generated_at)}</p>
        </article>

        ${renderRawPackageFields(pkg)}
      `;

      const copyRawJsonBtn = document.getElementById('copyRawJsonBtn');
      if (copyRawJsonBtn) copyRawJsonBtn.addEventListener('click', copyCurrentPackageJson);
    }

    async function loadSelected({ updateHash = true } = {}) {
      const entry = EXAMPLES[select.selectedIndex] || EXAMPLES[0];
      activeBundledHash = entry.hash;
      uploadStatus.textContent = 'Viewing bundled example package.';
      selectedPath.textContent = entry.file;
      content.innerHTML = '<article class="card"><p>Loading example package…</p></article>';
      if (updateHash) setHashForExample(entry);

      try {
        currentPackage = null;
        updateActionButtons();
        const resp = await fetch(entry.file, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const pkg = await resp.json();
        renderPackage(pkg, `Bundled example (${entry.label})`);
      } catch (error) {
        currentPackage = null;
        updateActionButtons();
        content.innerHTML = `<article class="card"><h2>Load Error</h2><p>Could not load <span class="mono">${entry.file}</span>.</p><p class="muted">${safe(error.message)}</p></article>`;
      }
    }

    async function loadLocalFile(file) {
      if (!file) return;
      clearDemoHashIfActive();
      uploadStatus.textContent = `Loading local package: ${file.name}`;
      selectedPath.textContent = `local://${file.name}`;
      content.innerHTML = '<article class="card"><p>Loading local package…</p></article>';
      try {
        currentPackage = null;
        updateActionButtons();
        const text = await file.text();
        const pkg = JSON.parse(text);
        renderPackage(pkg, `Local package (${file.name})`);
        setPackageActionStatus('Loaded local package. Uploaded JSON stays local and is not encoded in URL.', 4200);
        uploadStatus.textContent = 'Viewing local package. Processing is local-only and does not upload to any server.';
      } catch (error) {
        currentPackage = null;
        updateActionButtons();
        uploadStatus.textContent = 'Local package load failed.';
        content.innerHTML = `<article class="card"><h2>Invalid Package</h2><p>Could not parse local JSON package.</p><p class="muted">${safe(error.message)}</p><p class="muted">Fail-safe behavior preserved: viewer did not render invalid JSON.</p></article>`;
      }
    }

    EXAMPLES.forEach((ex) => {
      const option = document.createElement('option');
      option.textContent = ex.label;
      select.appendChild(option);
    });

    function loadSelectedFromHashOrDefault() {
      const hashValue = getCurrentHashValue();
      const indexFromHash = findExampleIndexByHash(hashValue);
      if (indexFromHash === -1) {
        if (hashValue) setPackageActionStatus(`Unknown demo hash "${hashValue}". Loaded selected bundled example instead.`, 4200);
        select.selectedIndex = findExampleIndexByHash(activeBundledHash) >= 0 ? findExampleIndexByHash(activeBundledHash) : 0;
        loadSelected({ updateHash: true });
        return;
      }
      select.selectedIndex = indexFromHash;
      loadSelected({ updateHash: false });
    }

    document.getElementById('reloadBtn').addEventListener('click', () => loadSelected({ updateHash: true }));
    copyPackageBtn.addEventListener('click', copyCurrentPackageJson);
    downloadPackageBtn.addEventListener('click', downloadCurrentPackageJson);
    printReportBtn.addEventListener('click', printCurrentReport);
    exportSummaryBtn.addEventListener('click', exportCurrentSummaryText);
    document.getElementById('resetBtn').addEventListener('click', () => {
      localUpload.value = '';
      updateActionButtons();
      const hashIndex = findExampleIndexByHash(getCurrentHashValue());
      if (hashIndex !== -1) {
        select.selectedIndex = hashIndex;
      } else {
        select.selectedIndex = findExampleIndexByHash(activeBundledHash) >= 0 ? findExampleIndexByHash(activeBundledHash) : 0;
      }
      loadSelected({ updateHash: true });
    });
    select.addEventListener('change', () => loadSelected({ updateHash: true }));
    localUpload.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      loadLocalFile(file);
    });
    window.addEventListener('hashchange', () => {
      loadSelectedFromHashOrDefault();
    });
    updateActionButtons();
    loadSelectedFromHashOrDefault();
  </script>
</body>
</html>
