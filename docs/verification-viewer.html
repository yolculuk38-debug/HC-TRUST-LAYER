<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HC:// MVP-1 Static Verification Package Viewer (Demo)</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #161d33;
      --text: #e6ebff;
      --muted: #a8b1d9;
      --pass: #27c47c;
      --warn: #ffbf3f;
      --fail: #ff6b6b;
      --border: #2b355d;
      --chip: #243058;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1rem; }
    .warn { background: #3a1f1f; border: 1px solid #8c3a3a; padding: .75rem; border-radius: .5rem; }
    .controls { margin: 1rem 0; display: grid; gap: .6rem; }
    .control-row { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; }
    select, button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: .5rem; padding: .65rem .75rem; font-size: 1rem;
    }
    input[type="file"] {
      width: 100%;
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: .5rem; padding: .55rem .75rem; font-size: .95rem;
    }
    button { cursor: pointer; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: .75rem; padding: .9rem; margin-bottom: .8rem; }
    h1, h2 { margin: .1rem 0 .7rem; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .result { display: inline-block; padding: .25rem .6rem; border-radius: 999px; font-weight: 700; }
    .PASS { background: rgba(39,196,124,.2); color: var(--pass); }
    .WARNING { background: rgba(255,191,63,.2); color: var(--warn); }
    .FAIL { background: rgba(255,107,107,.2); color: var(--fail); }
    .grid { display: grid; gap: .8rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    ul { margin: 0; padding-left: 1.1rem; }
    .chip { display: inline-block; background: var(--chip); border: 1px solid var(--border); border-radius: .4rem; padding: .15rem .45rem; margin: .1rem .15rem .1rem 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; word-break: break-all; }
    .muted { color: var(--muted); }
    .explain { margin-top: .65rem; padding: .7rem; border: 1px solid var(--border); border-radius: .55rem; background: rgba(11,16,32,.45); }
    .stack { display: grid; gap: .5rem; }
    .kicker { font-size: .85rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>HC:// MVP-1 Static Verification Package Viewer</h1>
    <p class="warn"><strong>Demo-only warning:</strong> This viewer is advisory only, performs local processing only, performs no server upload, provides no truth guarantee, and human review is recommended.</p>

    <div class="controls card">
      <label for="exampleSelect"><strong>Select example package</strong></label>
      <select id="exampleSelect"></select>
      <div class="control-row">
        <button id="reloadBtn" type="button">Reload selected package</button>
        <button id="resetBtn" type="button">Reset to selected example</button>
      </div>
      <label for="localUpload"><strong>Or load local verification package JSON</strong></label>
      <input id="localUpload" type="file" accept=".json,application/json" />
      <p class="muted" id="uploadStatus">Viewing bundled example package.</p>
      <p class="muted">Source path: <span id="selectedPath" class="mono"></span></p>
    </div>

    <section id="content"></section>
  </main>

  <script>
    const EXAMPLES = [
      { label: 'Verified trace', file: '../examples/verification-packages/verified-trace-example.json' },
      { label: 'Partial trace', file: '../examples/verification-packages/partial-trace-example.json' },
      { label: 'Replay warning', file: '../examples/verification-packages/replay-warning-example.json' },
      { label: 'Disputed', file: '../examples/verification-packages/disputed-example.json' },
      { label: 'Unverified', file: '../examples/verification-packages/unverified-example.json' }
    ];

    const select = document.getElementById('exampleSelect');
    const selectedPath = document.getElementById('selectedPath');
    const content = document.getElementById('content');
    const uploadStatus = document.getElementById('uploadStatus');
    const localUpload = document.getElementById('localUpload');
    const REQUIRED_FIELDS = [
      'package_id',
      'trust_result',
      'trust_confidence',
      'provenance_summary',
      'provenance_timeline',
      'validator_reviews',
      'replay_indicators',
      'dispute_indicators',
      'audit_snapshot'
    ];

    function safe(value, fallback = 'unknown') {
      return value === undefined || value === null || value === '' ? fallback : value;
    }

    function renderList(items, formatFn) {
      if (!Array.isArray(items) || items.length === 0) return '<p class="muted">No entries listed in this package.</p>';
      return '<ul>' + items.map((it) => `<li>${formatFn(it)}</li>`).join('') + '</ul>';
    }

    const ALLOWED_TRUST_RESULTS = ['VERIFIED TRACE', 'PARTIAL TRACE', 'REPLAY WARNING', 'DISPUTED', 'UNVERIFIED'];
    const SHA256_HEX_RE = /^[0-9a-f]{64}$/;

    function isHumanReadableConfidence(value) {
      return typeof value === 'string' && /[A-Za-z]/.test(value) && value.trim().length >= 3;
    }

    function getPackageWarnings(pkg) {
      const missingFields = REQUIRED_FIELDS.filter((field) => pkg[field] === undefined || pkg[field] === null);
      const warnings = [];
      if (missingFields.length > 0) warnings.push(`Missing required field(s): ${missingFields.join(', ')}`);

      if (!ALLOWED_TRUST_RESULTS.includes(safe(pkg.trust_result, ''))) {
        warnings.push('trust_result should be one of: VERIFIED TRACE, PARTIAL TRACE, REPLAY WARNING, DISPUTED, UNVERIFIED.');
      }
      if (!SHA256_HEX_RE.test(safe(pkg.content_hash, ''))) {
        warnings.push('content_hash should match lowercase SHA-256 hex format (64 hex characters).');
      }
      if (!isHumanReadableConfidence(pkg.trust_confidence)) {
        warnings.push('trust_confidence should be present and human-readable.');
      }
      ['provenance_timeline', 'validator_reviews', 'replay_indicators', 'dispute_indicators'].forEach((field) => {
        if (!Array.isArray(pkg[field])) warnings.push(`${field} should be an array.`);
      });
      return warnings;
    }

    function renderPackage(pkg, packageSourceLabel = 'Bundled example package') {
      const trustResult = safe(pkg.trust_result, 'UNVERIFIED');
      const packageWarnings = getPackageWarnings(pkg);
      const trustClass = packageWarnings.length > 0 ? 'WARNING' : 'PASS';
      const replayDetected = Array.isArray(pkg.replay_indicators) && pkg.replay_indicators.length > 0;
      const disputeActive = Array.isArray(pkg.dispute_indicators) && pkg.dispute_indicators.length > 0;
      const humanReviewRequired = !!pkg.human_review_required;
      const confidence = safe(pkg.trust_confidence);
      const warningHtml = packageWarnings.length > 0
        ? `<article class="card"><h2>Package Warnings</h2>${renderList(packageWarnings, (w) => safe(w))}</article>`
        : '';

      let summaryLabel = 'Human review required';
      let summaryMeaning = 'This package requires human-supervised validation before consequential trust decisions.';
      if (trustResult === 'VERIFIED TRACE' && !replayDetected && !disputeActive && !humanReviewRequired) {
        summaryLabel = 'Verified trace';
        summaryMeaning = 'Visible verification signals align within this package scope, with no active replay or dispute signal shown.';
      } else if (trustResult === 'PARTIAL TRACE' && !replayDetected && !disputeActive) {
        summaryLabel = 'Partial trace';
        summaryMeaning = 'Some verification signals are present, but scope coverage is incomplete or uncertain.';
      } else if (replayDetected) {
        summaryLabel = 'Replay warning';
        summaryMeaning = 'A replay-related caution signal is present and should be reviewed before relying on this package.';
      } else if (disputeActive) {
        summaryLabel = 'Disputed';
        summaryMeaning = 'An active dispute signal is present, so trust interpretation is unresolved in current scope.';
      } else if (trustResult === 'UNVERIFIED') {
        summaryLabel = 'Unverified';
        summaryMeaning = 'Current package scope does not provide enough verification support for a stronger trust result.';
      }

      content.innerHTML = `
        ${warningHtml}
        <article class="card">
          <h2>Trust Result Card</h2>
          <p><strong>Package source:</strong> ${safe(packageSourceLabel)}</p>
          <p><strong>Package:</strong> <span class="mono">${safe(pkg.package_id)}</span></p>
          <p><span class="result ${trustClass}">${trustResult}</span></p>
          <p><strong>Result label:</strong> ${summaryLabel}</p>
          <p><strong>Trust confidence:</strong> ${confidence}</p>
          <p><strong>Human review status:</strong> ${humanReviewRequired ? 'Human review required' : 'No explicit review flag in this package'}</p>
          <div class="explain stack">
            <p class="kicker">What this result means</p>
            <p>${summaryMeaning}</p>
            <p class="kicker">Why this package may need review</p>
            <p>Trust confidence, replay indicators, dispute indicators, provenance continuity, and validator review context can be incomplete or contested and should be interpreted with human-supervised validation.</p>
            <p class="kicker">What users should not assume</p>
            <p>Do not assume production readiness, truth guarantees, or forensic certainty from this static viewer output.</p>
            <p class="kicker">Demo-only limitation</p>
            <p>This HC:// viewer is local-only, browser-only, reads bundled or uploaded local JSON, and does not include backend verification services.</p>
          </div>
        </article>

        <article class="card"><h2>Content Hash</h2><p class="mono">${safe(pkg.content_hash)}</p></article>

        <article class="card"><h2>Provenance Summary</h2><p>${safe(pkg.provenance_summary)}</p><p class="muted">Provenance explains where this package came from and how continuity appears in the visible audit trail scope.</p></article>

        <article class="card"><h2>Provenance Timeline</h2>
          ${renderList(pkg.provenance_timeline, (e) => `<span class="chip">${safe(e.stage)}</span> ${safe(e.actor)} at ${safe(e.timestamp)} (${safe(e.status)})`)}
        </article>

        <article class="card"><h2>Validator Review Summary</h2>
          <p class="muted">Validator reviews are advisory interpretation signals, not standalone certainty claims.</p>
          ${renderList(pkg.validator_reviews, (r) => `<span class="chip">${safe(r.decision)}</span> ${safe(r.validator_id)} at ${safe(r.reviewed_at)} — ${safe(r.notes)}`)}
        </article>

        <section class="grid">
          <article class="card"><h2>Replay Warning Display</h2>
            <p><strong>Status:</strong> ${replayDetected ? 'Replay warning' : 'No replay warning shown'}</p>
            ${renderList(pkg.replay_indicators, (d) => `${safe(typeof d === 'string' ? d : JSON.stringify(d))}`)}
          </article>

          <article class="card"><h2>Dispute Status Display</h2>
            <p><strong>Status:</strong> ${disputeActive ? 'Disputed' : 'No active dispute shown'}</p>
            ${renderList(pkg.dispute_indicators, (id) => `<span class="mono">${safe(typeof id === 'string' ? id : JSON.stringify(id))}</span>`)}
          </article>
        </section>

        <article class="card"><h2>Audit Snapshot</h2>
          <p><strong>Audit trail ref:</strong> <span class="mono">${safe(pkg.audit_snapshot?.audit_trail_ref)}</span></p>
          <p><strong>Last event:</strong> ${safe(pkg.audit_snapshot?.last_event)}</p>
          <p><strong>Review boundary:</strong> ${safe(pkg.audit_snapshot?.review_boundary)}</p>
          <p><strong>Generated at:</strong> ${safe(pkg.generated_at)}</p>
        </article>
      `;
    }

    async function loadSelected() {
      const entry = EXAMPLES[select.selectedIndex] || EXAMPLES[0];
      uploadStatus.textContent = 'Viewing bundled example package.';
      selectedPath.textContent = entry.file;
      content.innerHTML = '<article class="card"><p>Loading example package…</p></article>';

      try {
        const resp = await fetch(entry.file, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const pkg = await resp.json();
        renderPackage(pkg, `Bundled example (${entry.label})`);
      } catch (error) {
        content.innerHTML = `<article class="card"><h2>Load Error</h2><p>Could not load <span class="mono">${entry.file}</span>.</p><p class="muted">${safe(error.message)}</p></article>`;
      }
    }

    async function loadLocalFile(file) {
      if (!file) return;
      uploadStatus.textContent = `Loading local package: ${file.name}`;
      selectedPath.textContent = `local://${file.name}`;
      content.innerHTML = '<article class="card"><p>Loading local package…</p></article>';
      try {
        const text = await file.text();
        const pkg = JSON.parse(text);
        renderPackage(pkg, `Local package (${file.name})`);
        uploadStatus.textContent = 'Viewing local package. Processing is local-only and does not upload to any server.';
      } catch (error) {
        uploadStatus.textContent = 'Local package load failed.';
        content.innerHTML = `<article class="card"><h2>Invalid Package</h2><p>Could not parse local JSON package.</p><p class="muted">${safe(error.message)}</p><p class="muted">Fail-safe behavior preserved: viewer did not render invalid JSON.</p></article>`;
      }
    }

    EXAMPLES.forEach((ex) => {
      const option = document.createElement('option');
      option.textContent = ex.label;
      select.appendChild(option);
    });

    document.getElementById('reloadBtn').addEventListener('click', loadSelected);
    document.getElementById('resetBtn').addEventListener('click', () => {
      localUpload.value = '';
      loadSelected();
    });
    select.addEventListener('change', loadSelected);
    localUpload.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      loadLocalFile(file);
    });
    loadSelected();
  </script>
</body>
</html>
